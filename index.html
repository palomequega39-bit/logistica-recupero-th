<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Logística Recupero</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <h2>Recupero</h2>

    <div id="dropzone" class="dropzone">
      <p>Arrastrar CSV</p>
      <input type="file" id="fileInput">
    </div>

    <div class="filters">

      <label>Institución</label>
      <select id="filtroInstitucion"></select>

      <label>Prioridad</label>
      <select id="filtroPrioridad"></select>

      <label>Ciudad</label>
      <select id="filtroCiudad"></select>

      <label>Devolución</label>
      <select id="filtroDevolucion"></select>

      <label>Foja</label>
      <select id="filtroFoja"></select>

      <label>CI</label>
      <select id="filtroCI"></select>

      <label>Fecha CX</label>
      <select id="filtroFecha"></select>

      <button onclick="aplicarFiltros()">Aplicar filtros</button>

    </div>

  </aside>

  <!-- LISTA -->
  <section class="lista">
    <div class="header">Órdenes</div>

    <div class="tabla-header">
      <span>★</span>
      <span>Orden</span>
      <span>Paciente</span>
      <span>DNI</span>
      <span>Obra</span>
      <span>Inst.</span>
      <span>Prio</span>
    </div>

    <div id="ordenesList"></div>
  </section>

  <!-- DETALLE -->
  <section class="detalle">

    <div id="cabecera" class="cabecera"></div>

    <table>
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cant</th>
          <th>Lote</th>
          <th>Serie</th>
          <th>Venc</th>
        </tr>
      </thead>
      <tbody id="detalleBody"></tbody>
    </table>

  </section>

</div>

<script src="app.js"></script>
</body>
</html>
