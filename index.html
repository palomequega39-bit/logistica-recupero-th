<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Logística Recupero</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<link rel="stylesheet" href="style.css?v=2.0.0">
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <h2>Recupero</h2>

    <div class="dropzone">
      <p>Arrastrar CSV</p>
      <input type="file" id="fileInput">
    </div>

    <div class="filters">

      <label>Institución</label>
      <input id="filtroInstitucion" class="inputFiltro">
      <div id="listaInstituciones" class="dropdown"></div>

      <label>Foja</label>
      <select id="filtroFoja"></select>

      <label>CI</label>
      <select id="filtroCI"></select>

      <label>Devolución</label>
      <select id="filtroDevolucion"></select>

      <label>Fecha CX</label>
      <select id="filtroFecha"></select>

      <button id="btnFiltrar">Aplicar filtros</button>

    </div>
  </aside>

  <main class="contenido">

    <section class="panel">
      <div class="titulo">Órdenes</div>

      <div class="tabla-header">
        <span onclick="sortBy('Orden')">Orden</span>
        <span onclick="sortBy('Paciente')">Paciente</span>
        <span onclick="sortBy('Dni')">DNI</span>
        <span onclick="sortBy('ObraSocial')">Obra</span>
        <span onclick="sortBy('FechaCX')">Fecha CX</span>
        <span onclick="sortBy('Ins')">Inst.</span>
      </div>

      <div id="ordenesList"></div>
    </section>

    <input id="buscadorGlobal" class="buscador">

    <section class="panel">
      <div class="titulo">Cabecera</div>
      <div id="cabecera" class="cabecera"></div>
    </section>

    <section class="panel">
      <div class="titulo">Productos</div>

      <table>
        <thead>
          <tr>
            <th>Remito</th>
            <th>Fecha R</th>
            <th>Producto</th>
            <th>Cant</th>
            <th>Lote</th>
            <th>Serie</th>
            <th>Venc</th>
          </tr>
        </thead>
        <tbody id="detalleBody"></tbody>
      </table>
    </section>

  </main>
</div>

<script src="app.js?v=2.0.0"></script>
</body>
</html>
