<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Logística Recupero</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <h2>Recupero</h2>

    <div id="dropzone" class="dropzone">
      <p>Arrastrá tu CSV</p>
      <span>o hacer click</span>
      <input type="file" id="fileInput">
    </div>

    <div class="filters">
      <select id="filtroInstitucion"></select>
      <select id="filtroPrioridad"></select>
      <select id="filtroCiudad"></select>

      <button onclick="aplicarFiltros()">Filtrar</button>
    </div>

  </aside>

  <!-- LISTA -->
  <section class="lista">
    <h3>Órdenes</h3>
    <div id="ordenesList"></div>
  </section>

  <!-- DETALLE -->
  <section class="detalle">

    <div id="cabecera" class="cabecera"></div>

    <table>
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cant</th>
          <th>Lote</th>
          <th>Serie</th>
          <th>Venc</th>
        </tr>
      </thead>
      <tbody id="detalleBody"></tbody>
    </table>

  </section>

</div>

<script src="app.js"></script>
</body>
</html>
