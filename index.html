<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Órdenes</title>

  <!-- Grid.js -->
  <link href="https://unpkg.com/gridjs/dist/theme/mermaid.min.css" rel="stylesheet" />
  <script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="sidebar">
    <h3>Filtros</h3>

    <select id="filtroInstitucion"></select>
    <select id="filtroDevolucion"></select>
    <select id="filtroFoja"></select>
    <select id="filtroCI"></select>
    <select id="filtroPrioridad"></select>
    <select id="filtroObra"></select>
    <select id="filtroCiudad"></select>

    <button onclick="aplicarFiltros()">Filtrar</button>
  </div>

  <div class="main">
    <h2>Órdenes</h2>
    <div id="tablaGrid"></div>

    <h2>Cabecera</h2>
    <div id="cabecera"></div>

    <h2>Detalle</h2>
    <div id="detalle"></div>
  </div>

</div>

<div style="padding:10px;">
  <input type="file" id="fileInput">
</div>

<script src="app.js" defer></script>

</body>
</html>
