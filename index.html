<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Logística Recupero</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="layout">

  <aside class="sidebar">

    <h2>Recupero</h2>

    <div id="dropzone" class="dropzone">
      <div class="dz-content">
        <div class="icon">⬆</div>
        <div>Arrastrar CSV</div>
      </div>

      <div id="fileStatus" class="hidden">
        <span id="fileName"></span> ✔
      </div>

      <input type="file" id="fileInput" accept=".csv">
    </div>

    <div class="filters">
      <label>Institución</label>
      <input id="filtroInstitucion">
      <div id="listaInstituciones"></div>

      <label>Prioridad</label>
      <select id="filtroPrioridad"></select>

      <label>Ciudad</label>
      <select id="filtroCiudad"></select>

      <button id="btnFiltrar">Filtrar</button>
    </div>

  </aside>

  <main class="contenido">

    <div class="panel">
      <div class="tabla-header">
        <span>Orden</span>
        <span>Paciente</span>
        <span>DNI</span>
        <span>Obra</span>
        <span>Fecha</span>
        <span>Institución</span>
        <span>Prioridad</span>
      </div>

      <div id="ordenesList"></div>
    </div>

    <input id="buscadorGlobal">

    <div class="panel">
      <div id="cabecera"></div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Remito</th>
          <th>Fecha</th>
          <th>Producto</th>
          <th>Cant</th>
        </tr>
      </thead>
      <tbody id="detalleBody"></tbody>
    </table>

  </main>

</div>

<script src="app.js"></script>
</body>
</html>
