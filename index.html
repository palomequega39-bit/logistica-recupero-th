<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Logística Recupero</title>
  
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link rel="stylesheet" href="style.css?v=2.2.7">

</head>
<body>

<div class="layout">

  <aside class="sidebar">

    <h2>Recupero TH</h2>

    <!-- DROPZONE NUEVO -->
    <div id="dropzone" class="dropzone">

      <div class="dz-content">
        <div class="icon">⬆</div>
        <div class="dz-title">Arrastrar CSV</div>
        <div class="dz-sub">o hacer click para seleccionar</div>
      </div>

      <div id="fileStatus" class="file-status hidden">
        <span id="fileName"></span>
        <span class="check">✔</span>
      </div>

      <input type="file" id="fileInput" accept=".csv">
    </div>

    <div class="filters">
      <label>Institución</label>
      <input id="filtroInstitucion" class="inputFiltro" placeholder="Buscar por institución...">
      <div id="listaInstituciones" class="dropdown"></div>

      <label>Prioridad</label>
      <select id="filtroPrioridad"></select>

      <label>Ciudad</label>
      <select id="filtroCiudad"></select>

      <label>Devolución Pendiente</label>
      <select id="filtroDevolucion"></select>

      <label>Foja</label>
      <select id="filtroFoja"></select>

      <label>CI</label>
      <select id="filtroCI"></select>

      <label>Fecha CX</label>
      <select id="filtroFecha"></select>

      <label>Vendedor</label>
      <select id="filtroVendedor"></select>
      
      <label>Médico</label>
      <select id="filtroMedico"></select>
      
      <label>Favoritos</label>
      <select id="filtroFavorito"></select>
            

      <button id="btnFiltrar">Aplicar filtros</button>
    </div>

  </aside>

  <main class="contenido">

    <section class="panel">
      <div class="titulo">Órdenes</div>

      <div class="tabla-header">
        <span onclick="sortBy('Orden')">Orden</span>
        <span onclick="sortBy('Paciente')">Paciente</span>
        <span onclick="sortBy('Dni')">DNI</span>
        <span onclick="sortBy('ObraSocial')">Obra Social</span>
        <span onclick="sortBy('FechaCX')">Fecha CX</span>
        <span onclick="sortBy('Institucion')">Institución</span>
        <span onclick="sortBy('Prioridad')">Prioridad</span>
      </div>

      <div id="ordenesList"></div>
    </section>

   <input id="buscadorGlobal" class="buscador" placeholder="Buscar por...">

    <section class="panel">
      <div class="titulo">Datos de la Orden</div>
      <div id="cabecera" class="cabecera"></div>
    </section>

    <section class="panel">
      <div class="titulo">Detalle de productos</div>

      <table>
        <thead>
          <tr>
            <th>Remito</th>
            <th>Fecha R</th>
            <th>Producto</th>
            <th>Cant</th>
            <th>Lote</th>
            <th>Serie</th>
            <th>Venc</th>
          </tr>
        </thead>
        <tbody id="detalleBody"></tbody>
      </table>
    </section>

  </main>

</div>

<script src="app.js?v=3.0.0"></script>
</body>
</html>
