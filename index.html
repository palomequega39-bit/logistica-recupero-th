<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Logística Recupero</title>

  <!-- Grid.js -->
  <link href="https://unpkg.com/gridjs/dist/theme/mermaid.min.css" rel="stylesheet"/>
  <script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">Recupero TH</div>

    <div class="dropzone" id="dropzone">
      <p>Arrastrá CSV acá</p>
      <span>o hacé click</span>
      <input type="file" id="fileInput" accept=".csv"/>
    </div>

    <div class="filters">
      <h4>Filtros</h4>

      <select id="filtroInstitucion"></select>
      <select id="filtroPrioridad"></select>
      <select id="filtroObra"></select>
      <select id="filtroCiudad"></select>

      <select id="filtroDevolucion"></select>
      <select id="filtroFoja"></select>
      <select id="filtroCI"></select>

      <button id="btnFiltrar">Aplicar</button>
      <button id="btnReset" class="ghost">Reset</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <section class="panel">
      <div class="panel-header">
        <h2>Órdenes</h2>
        <div id="counter"></div>
      </div>
      <div id="tablaGrid"></div>
    </section>

    <section class="panel">
      <h2>Cabecera</h2>
      <div id="cabecera" class="cabecera-grid"></div>
    </section>

    <section class="panel">
      <h2>Detalle</h2>
      <div id="detalle"></div>
    </section>

  </main>

</div>

<script src="app.js" defer></script>
</body>
</html>
